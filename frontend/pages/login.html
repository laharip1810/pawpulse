<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – PawPulse</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card animate-in">
    <div class="auth-logo">
      <div style="font-size:3rem;">🐾</div>
      <div class="logo-text">PawPulse</div>
      <div class="logo-sub">Sign in to your account</div>
    </div>

    <div id="errorBox" class="alert alert-danger" style="display:none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
        Sign In
      </button>
    </form>

    <div style="margin:1.5rem 0;border-top:1px dashed var(--border);position:relative;text-align:center;">
      <span style="background:var(--surface);padding:.2rem .8rem;color:var(--text-soft);font-size:.8rem;position:relative;top:-.7rem;">or try demo</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem;">
      <button onclick="demoLogin('user')" class="btn btn-outline btn-sm" style="justify-content:center;">
        👤 Demo User
      </button>
      <button onclick="demoLogin('admin')" class="btn btn-amber btn-sm" style="justify-content:center;">
        🛡️ Demo Admin
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  if (isLoggedIn()) {
    window.location.href = isAdmin() ? 'admin.html' : 'dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';
    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      const data = await AuthAPI.login({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      setAuth(data.token, data.user);
      showToast('Welcome back! 🐾');
      setTimeout(() => {
        window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
      }, 500);
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'flex';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  });

  async function demoLogin(role) {
    document.getElementById('email').value = role === 'admin'
      ? 'admin@pawpulse.com'
      : 'demo@pawpulse.com';
    document.getElementById('password').value = role === 'admin' ? 'Admin@123' : 'demo123456';
    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
  }
</script>
</body>
</html>
