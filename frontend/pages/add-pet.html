<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Pet – PawPulse</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="nav-brand"><span class="paw">🐾</span> PawPulse</a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">← Dashboard</a>
    <a href="daily-logs.html" class="nav-link">Daily Logs</a>
    <button onclick="logout()" class="nav-btn outline">Logout</button>
  </div>
</nav>

<div class="page-wrapper" style="max-width:680px;">
  <div class="page-header">
    <div>
      <h1 class="page-title">Add a New Pet 🐾</h1>
      <p class="page-subtitle">Fill in your pet's details. Vaccination schedule will be auto-generated!</p>
    </div>
  </div>

  <div class="card animate-in">
    <div id="errorBox" class="alert alert-danger" style="display:none;"></div>
    <div id="successBox" class="alert alert-success" style="display:none;"></div>

    <form id="addPetForm">
      <!-- Pet Preview -->
      <div style="text-align:center;margin-bottom:1.75rem;">
        <div id="petPreview" style="font-size:4rem;transition:all .3s;">🐾</div>
        <p style="font-size:.82rem;color:var(--text-soft);margin-top:.25rem;">Choose species to see icon</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pet Name *</label>
          <input type="text" id="petName" class="form-control" placeholder="e.g. Bruno, Whiskers" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Species *</label>
          <select id="species" class="form-control" required onchange="updatePreview()">
            <option value="">Select Species</option>
            <option value="Dog">🐕 Dog</option>
            <option value="Cat">🐈 Cat</option>
            <option value="Bird">🦜 Bird</option>
            <option value="Rabbit">🐇 Rabbit</option>
            <option value="Fish">🐟 Fish</option>
            <option value="Hamster">🐹 Hamster</option>
            <option value="Other">🐾 Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Breed</label>
          <input type="text" id="breed" class="form-control" placeholder="e.g. Labrador, Persian"/>
        </div>
        <div class="form-group">
          <label class="form-label">Gender *</label>
          <select id="gender" class="form-control" required>
            <option value="">Select Gender</option>
            <option value="Male">♂ Male</option>
            <option value="Female">♀ Female</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Age *</label>
          <input type="number" id="age" class="form-control" placeholder="e.g. 2" min="0" step="0.1" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Age Unit</label>
          <select id="ageUnit" class="form-control">
            <option value="years">Years</option>
            <option value="months">Months</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Weight (kg)</label>
          <input type="number" id="weight" class="form-control" placeholder="e.g. 8.5" min="0" step="0.1"/>
        </div>
        <div class="form-group">
          <label class="form-label">Color / Markings</label>
          <input type="text" id="color" class="form-control" placeholder="e.g. Brown & White"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="notes" class="form-control" rows="3" placeholder="Any special notes about your pet..."></textarea>
      </div>

      <!-- Vaccine Info Box -->
      <div class="alert alert-info" style="margin-bottom:1.5rem;">
        💉 <strong>Auto-Vaccination Schedule:</strong> Based on species, we'll auto-create vaccination reminders for your pet!
      </div>

      <div style="display:flex;gap:1rem;">
        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" style="flex:1;">
          🐾 Add Pet & Generate Vaccine Schedule
        </button>
        <a href="dashboard.html" class="btn btn-outline btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  if (!requireAuth()) {}

  const SPECIES_EMOJI = { Dog:'🐕', Cat:'🐈', Bird:'🦜', Rabbit:'🐇', Fish:'🐟', Hamster:'🐹', Other:'🐾' };

  function updatePreview() {
    const species = document.getElementById('species').value;
    document.getElementById('petPreview').textContent = SPECIES_EMOJI[species] || '🐾';
  }

  document.getElementById('addPetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    errorBox.style.display = 'none';
    successBox.style.display = 'none';
    btn.textContent = 'Adding Pet...';
    btn.disabled = true;

    try {
      const data = await PetAPI.create({
        name: document.getElementById('petName').value,
        species: document.getElementById('species').value,
        breed: document.getElementById('breed').value,
        gender: document.getElementById('gender').value,
        age: parseFloat(document.getElementById('age').value),
        ageUnit: document.getElementById('ageUnit').value,
        weight: parseFloat(document.getElementById('weight').value) || undefined,
        color: document.getElementById('color').value,
        notes: document.getElementById('notes').value
      });

      const vacCount = data.pet.vaccinations?.length || 0;
      successBox.innerHTML = `🎉 <strong>${data.pet.name}</strong> added! ${vacCount} vaccinations scheduled automatically.`;
      successBox.style.display = 'flex';
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'flex';
      btn.textContent = '🐾 Add Pet & Generate Vaccine Schedule';
      btn.disabled = false;
    }
  });

  function logout() { clearAuth(); window.location.href = '../index.html'; }
</script>
</body>
</html>
