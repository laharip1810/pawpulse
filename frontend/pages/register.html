<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – PawPulse</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card animate-in">
    <div class="auth-logo">
      <div style="font-size:3rem;">🐾</div>
      <div class="logo-text">PawPulse</div>
      <div class="logo-sub">Create your free account</div>
    </div>

    <div id="errorBox" class="alert alert-danger" style="display:none;"></div>
    <div id="successBox" class="alert alert-success" style="display:none;"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone (optional)</label>
        <input type="tel" id="phone" class="form-control" placeholder="+91 98765 43210"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="At least 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
        Create Account 🐾
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  if (isLoggedIn()) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    errorBox.style.display = 'none';
    successBox.style.display = 'none';

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    if (password !== confirmPassword) {
      errorBox.textContent = 'Passwords do not match.';
      errorBox.style.display = 'flex';
      return;
    }

    btn.textContent = 'Creating Account...';
    btn.disabled = true;

    try {
      const data = await AuthAPI.register({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password,
        phone: document.getElementById('phone').value
      });
      setAuth(data.token, data.user);
      successBox.textContent = '🎉 Account created! Redirecting...';
      successBox.style.display = 'flex';
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'flex';
      btn.textContent = 'Create Account 🐾';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
